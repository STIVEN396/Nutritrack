<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriTrack – Register</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: linear-gradient(160deg, #fff3ee 0%, #ffecd2 100%);
         min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 24px; padding: 36px 32px;
          width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,.10); }
  .logo { text-align: center; margin-bottom: 24px; }
  .logo .icon { font-size: 48px; }
  .logo h1 { font-size: 26px; font-weight: 700; margin-top: 8px; }
  .logo span { color: #e8774b; }
  label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 5px; }
  input { width: 100%; border: 1.5px solid #eee; border-radius: 12px;
          padding: 11px 14px; font-size: 14px; outline: none; margin-bottom: 14px; transition: border .2s; }
  input:focus { border-color: #e8774b; }
  .help { font-size: 11px; color: #bbb; margin-top: -10px; margin-bottom: 12px; }
  .errors { font-size: 12px; color: #c00; margin-top: -10px; margin-bottom: 10px; }
  .btn { background: linear-gradient(135deg, #e8774b, #f9a825);
         color: #fff; border: none; border-radius: 14px; padding: 13px;
         width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .btn:hover { opacity: .9; }
  .footer { text-align: center; margin-top: 18px; font-size: 13px; color: #aaa; }
  .footer a { color: #e8774b; text-decoration: none; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="icon">🥗</div>
    <h1>Nutri<span>Track</span></h1>
  </div>

  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <label>{{ field.label }}</label>
      {{ field }}
      {% if field.help_text %}<p class="help">{{ field.help_text }}</p>{% endif %}
      {% for error in field.errors %}<p class="errors">{{ error }}</p>{% endfor %}
    {% endfor %}
    <button class="btn" type="submit">Create Account</button>
  </form>

  <div class="footer">
    Already have an account? <a href="{% url 'login' %}">Log in</a>
  </div>
</div>
</body>
</html>

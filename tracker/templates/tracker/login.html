<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriTrack – Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: linear-gradient(160deg, #fff3ee 0%, #ffecd2 100%);
         min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 24px; padding: 36px 32px;
          width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,.10); }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo .icon { font-size: 48px; }
  .logo h1 { font-size: 26px; font-weight: 700; margin-top: 8px; }
  .logo span { color: #e8774b; }
  .logo p { font-size: 13px; color: #aaa; margin-top: 4px; }
  label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 5px; }
  input { width: 100%; border: 1.5px solid #eee; border-radius: 12px;
          padding: 11px 14px; font-size: 14px; outline: none; margin-bottom: 16px; transition: border .2s; }
  input:focus { border-color: #e8774b; }
  .btn { background: linear-gradient(135deg, #e8774b, #f9a825);
         color: #fff; border: none; border-radius: 14px; padding: 13px;
         width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .btn:hover { opacity: .9; }
  .errors { background: #fff0f0; border-radius: 10px; padding: 10px 12px;
            font-size: 13px; color: #c00; margin-bottom: 14px; }
  .footer { text-align: center; margin-top: 18px; font-size: 13px; color: #aaa; }
  .footer a { color: #e8774b; text-decoration: none; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="icon">🍎</div>
    <h1>Nutri<span>Track</span></h1>
    <p>Track your daily nutrition</p>
  </div>

  {% if form.errors %}
    <div class="errors">Invalid username or password.</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <label for="id_username">Username</label>
    <input type="text" name="username" id="id_username" placeholder="Your username" autofocus>
    <label for="id_password">Password</label>
    <input type="password" name="password" id="id_password" placeholder="Your password">
    <button class="btn" type="submit">Log In</button>
  </form>

  <div class="footer">
    Don't have an account? <a href="{% url 'register' %}">Register</a>
  </div>
</div>
</body>
</html>
